<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCore - Actualizar Perfil</title>
    <style>
        :root {
            --negro: #000000;
            --azul: #2746FF;
            --morado: #680EBC;
            --lavanda: #8767EB;
            --menta: #59DEA0;
            --fondo-soft: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--negro);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .edit-box {
            background: var(--fondo-soft);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .edit-box h2 {
            margin: 0 0 2rem 0;
            color: var(--menta);
            font-size: 1.8rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--lavanda);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--menta);
            box-shadow: 0 0 10px rgba(89, 222, 160, 0.2);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-save {
            background: linear-gradient(45deg, var(--morado), var(--azul));
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 70, 255, 0.4);
        }

        .btn-cancel {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .btn-cancel:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="edit-box">
        <h2>Reconfigurar Perfil</h2>

        <form action="inicio.html">
            <div class="form-group">
                <label>Alias de Explorador</label>
                <input type="text" value="Explorador_X">
            </div>

            <div class="form-group">
                <label>Correo de Comunicaciones</label>
                <input type="email" value="explorador@universo.com">
            </div>

            <div class="form-group">
                <label>Nueva Clave de Encriptación</label>
                <input type="password" placeholder="••••••••">
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-save">Guardar Cambios</button>
                <a href="inicio.html" class="btn btn-cancel">Cancelar y Salir</a>
            </div>
        </form>
    </div>

</body>
</html>
